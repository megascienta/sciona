name: Reducer Validation

on:
  pull_request:
    paths:
      - "validations/reducers/**"
      - "tests/reducers/**"
      - ".github/workflows/reducer-validation.yml"
  push:
    branches: [main]
    paths:
      - "validations/reducers/**"
      - "tests/reducers/**"
      - ".github/workflows/reducer-validation.yml"

jobs:
  reducer-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Conda (multiphysics)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: multiphysics
          python-version: "3.11"
          auto-activate-base: false

      - name: Install Dependencies
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Stale Calibration Override Warning
        shell: bash -l {0}
        run: |
          python - <<'PY'
          from validations.reducers.validation import config
          warnings = config.stale_repo_override_warnings()
          if not warnings:
              print("No stale calibration overrides.")
          for item in warnings:
              print(f"::warning::{item}")
          PY

      - name: Reducer Validation Tests
        shell: bash -l {0}
        run: |
          pytest -q \
            tests/reducers/test_validation_calibration.py \
            tests/reducers/test_validation_invariants.py \
            tests/reducers/test_validation_reporting.py \
            tests/reducers/test_independent_parsers.py -k "not java_parser"
