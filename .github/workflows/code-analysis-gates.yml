name: code-analysis-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: multiphysics
          auto-activate-base: false
          python-version: "3.11"
          channels: conda-forge
          use-mamba: true

      - name: Install package
        shell: bash -l {0}
        run: |
          python -m pip install -e .

      - name: Run code analysis hard gates
        shell: bash -l {0}
        run: |
          pytest -q \
            tests/code_analysis/test_tree_sitter_policy.py \
            tests/code_analysis/test_strict_call_contract.py \
            tests/code_analysis/test_structural_assembler_contract.py \
            tests/code_analysis/test_language_parity_triplets.py \
            tests/code_analysis/test_language_parity_generated.py \
            tests/code_analysis/test_language_parity_bench.py \
            tests/code_analysis
