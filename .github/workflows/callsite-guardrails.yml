name: Callsite Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  non-test-callsite-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SCIONA
        run: python -m pip install -e .

      - name: Build Snapshot
        run: sciona build --force

      - name: Emit Status JSON
        run: sciona status --json --output /tmp/sciona_status.json

      - name: Validate Non-Test Guardrails
        run: >
          python validations/check_callsite_guardrails.py
          --status-json /tmp/sciona_status.json
          --config validations/callsite_guardrails.json
