call_neighbors:
  scope: callable
  invoke:
    entity: callable
    args:
      callable_id: callable_id
  required_fields:
    - callable_id
    - caller_count
    - callee_count
    - callers
    - callees
    - artifact_available
    - edge_source
  required_paths:
    - callers[].structural_id
    - callers[].qualified_name
    - callers[].node_type
    - callees[].structural_id
    - callees[].qualified_name
    - callees[].node_type
  types:
    callable_id: str
    caller_count: int
    callee_count: int
    callers: list
    callees: list
    artifact_available: bool
    edge_source: str
  invariants:
    - equals_len: [caller_count, callers]
    - equals_len: [callee_count, callees]
  echo_fields: []
  evidence_fields:
    - callers
    - callees

callable_overview:
  scope: callable
  invoke:
    entity: callable
    args:
      callable_id: callable_id
  required_fields:
    - projection
    - projection_version
    - function_id
    - callable_id
    - requested_identifier
    - language
    - module_qualified_name
    - file_path
    - line_span
    - content_hash
    - parameters
    - signature
    - decorators
    - parent_structural_id
    - parent_type
    - parent_qualified_name
    - artifact_available
    - edge_source
  optional_fields:
    - line_span_hash
    - identity
    - start_byte
    - end_byte
  types:
    projection: str
    projection_version: str
    function_id: str
    callable_id: str
    requested_identifier: str
    language: str
    module_qualified_name: str
    file_path: str
    line_span: list
    content_hash: str
    parameters: list
    signature: str
    decorators: list
    parent_structural_id: str
    parent_type: str
    parent_qualified_name: str
    artifact_available: bool
    edge_source: str
    identity: dict
  echo_fields:
    - requested_identifier
  evidence_fields:
    - callable_id
    - function_id
    - module_qualified_name
    - parent_structural_id
    - parent_qualified_name
    - identity

callable_source:
  scope: callable
  invoke:
    entity: callable
    args:
      callable_id: callable_id
  required_fields:
    - file_path
    - line_span
    - source
  types:
    file_path: str
    line_span: list
    source: str
  echo_fields: []
  evidence_fields:
    - file_path
    - line_span

callsite_index:
  scope: callable
  invoke:
    entity: callable
    args:
      callable_id: callable_id
    defaults:
      direction: both
  required_fields:
    - callable_id
    - direction
    - artifact_available
    - edge_source
    - edge_count
    - edges
  required_paths:
    - edges[].caller_id
    - edges[].callee_id
    - edges[].edge_kind
    - edges[].edge_source
  types:
    callable_id: str
    direction: str
    artifact_available: bool
    edge_source: str
    edge_count: int
    edges: list
  invariants:
    - equals_len: [edge_count, edges]
  echo_fields:
    - direction
  evidence_fields:
    - edges

