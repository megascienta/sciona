module_impact_v1:
  kind: core
  spec: module_impact_v1.md
  reducers:
    - module_overview
    - dependency_edges
    - importers_index
  required_args:
    - module_id
  summary: Evidence-first impact briefing for a target module.

callable_impact_v1:
  kind: core
  spec: callable_impact_v1.md
  reducers:
    - callable_overview
    - call_graph
  required_args:
    - callable_id
  summary: Evidence-first impact briefing for a target callable.
